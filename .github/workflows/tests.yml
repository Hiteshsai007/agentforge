name: Tests

# Only run on main branch pushes and PRs (not forks)
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ─────────────────────────────────────────────
  # MAIN TEST JOB - Only runs with secrets
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    
    # SECURITY: Skip if secrets are not available (fork protection)
    if: github.repository == 'Hiteshsai007/agentforge' || github.event_name != 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: ${{ runner.os }}-venv-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Start backend server
        working-directory: backend
        run: |
          source .venv/bin/activate
          export SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          export SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          export GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
          nohup .venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port 8013 &
          sleep 10

      - name: Wait for backend to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8013/health > /dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i)"
            sleep 2
          done
          echo "Backend failed to start"
          exit 1

      - name: Run tests
        working-directory: backend
        run: |
          source .venv/bin/activate
          export SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          export SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          export GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
          export TEST_COMPANY_ID="${{ secrets.TEST_COMPANY_ID }}"
          export TEST_API_KEY="${{ secrets.TEST_API_KEY }}"
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=html --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./backend/coverage.xml
          flags: unittests
          name: AI-Agent-Marketplace
          fail_ci_if_error: false

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/htmlcov/
          retention-days: 14

  # ─────────────────────────────────────────────
  # LINT JOB - No secrets needed, safe for forks
  # ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linting tools
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install ruff black

      - name: Run ruff linter
        run: |
          source .venv/bin/activate
          ruff check backend/ --fix || true

      - name: Run black formatter check
        run: |
          source .venv/bin/activate
          black --check backend/ || true

  # ─────────────────────────────────────────────
  # FEATURE TESTS - Only with secrets
  # ─────────────────────────────────────────────
  test-features:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature: [delegation, evolution, integration]
    
    # SECURITY: Skip if secrets not available
    if: github.repository == 'Hiteshsai007/agentforge' || github.event_name != 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Start backend
        working-directory: backend
        run: |
          source .venv/bin/activate
          export SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          export SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          export GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
          nohup .venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port 8013 &
          sleep 10

      - name: Run ${{ matrix.feature }} tests
        working-directory: backend
        run: |
          source .venv/bin/activate
          export SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          export SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          export GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
          export TEST_COMPANY_ID="${{ secrets.TEST_COMPANY_ID }}"
          export TEST_API_KEY="${{ secrets.TEST_API_KEY }}"
          pytest tests/ -v -m ${{ matrix.feature }}
